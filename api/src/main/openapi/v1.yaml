openapi: 3.0.3
info:
  title: ebean-insight v1 API
  version: 1.0.0
  description: |
    Versioned, agent/CLI-friendly API for ebean-insight-server.

    Design rules:
    - Natural keys in URLs (apps + envs are referenced by name; metrics and
      plans by `hash`). The only internal id appearing in a URL is `planId`.
    - Mandatory parameters are path parameters; optional parameters are
      query parameters.
    - Resource-oriented; aggregations are sub-resources (e.g.
      `/metrics/top`, `/metrics/missing-plans`).
    - The `by-hash` discriminator segment avoids future path collisions.
    - Unknown natural keys (app, label, hash) return an empty list (200);
      404 is reserved for the canonical `/v1/plans/{planId}` lookup.
    - Query-parameter names match OpenTelemetry span attribute names where
      relevant: `app` ↔ `service.name`, `label` ↔ `ebean.query_label`,
      `hash` ↔ `ebean.query_hash`.

    Time-window parameters:
    - `sinceMinutes` and `sinceHours` are mutually exclusive; supplying both
      yields HTTP 400. Same applies to `olderThanMinutes`/`olderThanHours`
      and `activeWithinMinutes`/`activeWithinHours`. (OpenAPI 3.0 cannot
      express this; enforced in the controller.)
    - Defaults: top-N + stats default to 60 minutes when neither supplied;
      `missing-plans` defaults to 0 (any plan-capable metric not currently
      captured); listings have no default time filter; `active` apps
      default to 60 minutes.
    - `limit`: default 50, hard cap 200.

    Plan-capable metrics:
    - "Plan capable" = a SELECT-style metric whose name starts with
      `orm.`, `dto.`, or `sql.query.` (excluding `orm.update.`).
      Update/delete metrics cannot have query plans captured.

servers:
  - url: /
    description: ebean-insight-server

tags:
  - name: apps
  - name: envs
  - name: metrics
  - name: plans

paths:
  /v1/apps:
    get:
      tags: [apps]
      operationId: listApps
      summary: List applications
      parameters:
        - $ref: '#/components/parameters/ActiveWithinMinutes'
        - $ref: '#/components/parameters/ActiveWithinHours'
      responses:
        '200':
          description: Applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/App'
        '400':
          $ref: '#/components/responses/BadRequest'

  /v1/apps/{app}:
    get:
      tags: [apps]
      operationId: getApp
      summary: Application summary
      parameters:
        - $ref: '#/components/parameters/AppPath'
      responses:
        '200':
          description: Application summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppSummary'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/apps/{app}/metrics:
    get:
      tags: [metrics]
      operationId: listAppMetrics
      summary: List metrics for an application
      parameters:
        - $ref: '#/components/parameters/AppPath'
        - $ref: '#/components/parameters/MetricName'
        - name: label
          in: query
          schema:
            type: string
          description: Optional label filter (exact match on the `label` tag, or family name for v1-style metrics).
        - $ref: '#/components/parameters/KindTag'
        - $ref: '#/components/parameters/TypeTag'
        - name: planCapable
          in: query
          schema:
            type: boolean
          description: When set, only return metrics with the matching plan-capable flag.
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Metrics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AppMetric'
        '400':
          $ref: '#/components/responses/BadRequest'

  /v1/apps/{app}/metrics/by-hash/{hash}:
    get:
      tags: [metrics]
      operationId: getMetricByHash
      summary: Single metric by hash
      parameters:
        - $ref: '#/components/parameters/AppPath'
        - $ref: '#/components/parameters/HashPath'
      responses:
        '200':
          description: Metric (empty list when no match — clients should treat 0/1 result identically)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AppMetric'

  /v1/apps/{app}/metrics/by-hash/{hash}/stats:
    get:
      tags: [metrics]
      operationId: getMetricStatsByHash
      summary: Aggregated stats for a metric
      description: Aggregated count + total/mean/max execution time over the requested window.
      parameters:
        - $ref: '#/components/parameters/AppPath'
        - $ref: '#/components/parameters/HashPath'
        - $ref: '#/components/parameters/SinceMinutes'
        - $ref: '#/components/parameters/SinceHours'
        - $ref: '#/components/parameters/EnvQuery'
      responses:
        '200':
          description: Stats (empty list when no match)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AppMetricStats'
        '400':
          $ref: '#/components/responses/BadRequest'

  /v1/apps/{app}/metrics/by-hash/{hash}/timeseries:
    get:
      tags: [metrics]
      operationId: getMetricTimeseries
      summary: Per-bucket time-series for a metric
      description: |
        Returns the raw additive components (count, total, max) per time bucket
        for a single metric, over the requested window. The bucket resolution is
        chosen automatically from the window (1m / 10m / 60m / 1d), so callers
        derive mean client-side (total / count) and render the trend.
      parameters:
        - $ref: '#/components/parameters/AppPath'
        - $ref: '#/components/parameters/HashPath'
        - $ref: '#/components/parameters/SinceMinutes'
        - $ref: '#/components/parameters/SinceHours'
        - $ref: '#/components/parameters/EnvQuery'
      responses:
        '200':
          description: Ordered buckets (oldest first; empty list when no match)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricTimeseries'
        '400':
          $ref: '#/components/responses/BadRequest'

  /v1/apps/{app}/metrics/top:
    get:
      tags: [metrics]
      operationId: topAppMetrics
      summary: Top-N metrics for an application, ranked at a chosen aggregation level
      parameters:
        - $ref: '#/components/parameters/AppPath'
        - $ref: '#/components/parameters/By'
        - $ref: '#/components/parameters/MetricName'
        - $ref: '#/components/parameters/LabelTag'
        - $ref: '#/components/parameters/KindTag'
        - $ref: '#/components/parameters/TypeTag'
        - $ref: '#/components/parameters/OrderBy'
        - $ref: '#/components/parameters/SinceMinutes'
        - $ref: '#/components/parameters/SinceHours'
        - $ref: '#/components/parameters/Limit'
        - name: planCapable
          in: query
          schema:
            type: boolean
          description: Optional filter; when true, restrict to plan-capable metrics.
        - $ref: '#/components/parameters/EnvQuery'
      responses:
        '200':
          description: Top-N ranked groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TopGroup'
        '400':
          $ref: '#/components/responses/BadRequest'

  /v1/apps/{app}/metrics/missing-plans:
    get:
      tags: [metrics]
      operationId: listMissingPlans
      summary: Plan-capable metrics with no recent plan capture
      description: |
        Returns plan-capable metrics whose most recent capture is older than
        the supplied window. Metrics that have never been captured are
        always included regardless of the window. Each row is enriched with
        execution cost over the `--since` window and ordered by `orderBy`.
      parameters:
        - $ref: '#/components/parameters/AppPath'
        - $ref: '#/components/parameters/OrderBy'
        - $ref: '#/components/parameters/SinceMinutes'
        - $ref: '#/components/parameters/SinceHours'
        - $ref: '#/components/parameters/OlderThanMinutes'
        - $ref: '#/components/parameters/OlderThanHours'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Missing plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MissingPlanMetric'
        '400':
          $ref: '#/components/responses/BadRequest'

  /v1/apps/{app}/plans/by-hash/{hash}/request:
    post:
      tags: [plans]
      operationId: requestPlanCapture
      summary: Request a fresh plan capture for a hash
      description: |
        Enqueues a plan-capture request for the next ingest from the
        target app + environment. Non-orm metrics will be rejected with 400.
      parameters:
        - $ref: '#/components/parameters/AppPath'
        - $ref: '#/components/parameters/HashPath'
        - $ref: '#/components/parameters/EnvQuery'
      responses:
        '201':
          description: Capture request enqueued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PendingResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/plans/{planId}:
    get:
      tags: [plans]
      operationId: getPlan
      summary: Single captured plan (full SQL/bind/plan text)
      parameters:
        - name: planId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryPlan'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/plans:
    get:
      tags: [plans]
      operationId: listPlans
      summary: Recent captured plans (cross-app)
      parameters:
        - name: app
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/EnvQuery'
        - name: label
          in: query
          schema:
            type: string
        - name: hash
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/SinceMinutes'
        - $ref: '#/components/parameters/SinceHours'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Plan summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/QueryPlanSummary'
        '400':
          $ref: '#/components/responses/BadRequest'

  /v1/plans/pending:
    get:
      tags: [plans]
      operationId: listPendingPlans
      summary: In-flight plan captures (requested but not yet collected)
      description: |
        Returns query-plan capture requests that have been made but whose plan
        has not yet been ingested, optionally filtered by app/env.

        Requests are tracked durably on the server: each is recorded when made
        and cleared once the matching plan is ingested, so this view survives
        forwarder polls and server restarts and covers the whole bind-collection
        window. A request whose query never executes ages out after ~15 minutes.
        Each entry carries the time it was requested.
      parameters:
        - name: app
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/EnvQuery'
      responses:
        '200':
          description: Pending captures
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PendingPlan'

  /v1/plan-changes:
    get:
      tags: [plans]
      operationId: listPlanChanges
      summary: Recent query-plan shape changes (cross-app)
      description: |
        Durable history of detected query-plan shape events, newest first
        (ordered by detection time). Each event is either the FIRST shape
        observed for an `(app, env, hash)` series, or a CHANGED shape relative
        to the most recent prior capture.

        Filter by app, env, hash, and changeType. The window (`sinceMinutes` /
        `sinceHours`) applies to the detection time.
      parameters:
        - name: app
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/EnvQuery'
        - name: hash
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/ChangeTypeQuery'
        - $ref: '#/components/parameters/SinceMinutes'
        - $ref: '#/components/parameters/SinceHours'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Plan change events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlanChange'
        '400':
          $ref: '#/components/responses/BadRequest'

  /v1/plan-changes/{id}:
    get:
      tags: [plans]
      operationId: getPlanChange
      summary: One plan-change event with full from/to plans
      description: |
        Returns a single detected plan-change event together with the full
        captured `fromPlan` (null for FIRST events) and `toPlan` — including
        SQL, bind values, EXPLAIN output and normalized plan shape — so the
        before/after plans can be diffed.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Plan change detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanChangeDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/metrics/top:
    get:
      tags: [metrics]
      operationId: topMetrics
      summary: Top-N metrics across all applications, ranked at a chosen aggregation level
      parameters:
        - $ref: '#/components/parameters/By'
        - $ref: '#/components/parameters/MetricName'
        - $ref: '#/components/parameters/LabelTag'
        - $ref: '#/components/parameters/KindTag'
        - $ref: '#/components/parameters/TypeTag'
        - $ref: '#/components/parameters/OrderBy'
        - $ref: '#/components/parameters/SinceMinutes'
        - $ref: '#/components/parameters/SinceHours'
        - $ref: '#/components/parameters/Limit'
        - name: planCapable
          in: query
          schema:
            type: boolean
        - $ref: '#/components/parameters/EnvQuery'
        - $ref: '#/components/parameters/AllApps'
      responses:
        '200':
          description: Top-N ranked groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TopGroup'
        '400':
          $ref: '#/components/responses/BadRequest'

  /v1/metrics/missing-plans:
    get:
      tags: [metrics]
      operationId: topMissingPlans
      summary: Plan-capable metrics with no recent plan capture, across all applications
      description: |
        Cross-app variant of listMissingPlans. Returns plan-capable metrics
        (across every application) whose most recent capture is older than the
        supplied window, ranked by execution cost over the `--since` window.
        Metrics never captured are always included.
      parameters:
        - $ref: '#/components/parameters/OrderBy'
        - $ref: '#/components/parameters/SinceMinutes'
        - $ref: '#/components/parameters/SinceHours'
        - $ref: '#/components/parameters/OlderThanMinutes'
        - $ref: '#/components/parameters/OlderThanHours'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Missing plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MissingPlanMetric'
        '400':
          $ref: '#/components/responses/BadRequest'

  /v1/envs:
    get:
      tags: [envs]
      operationId: listEnvs
      summary: List environments
      responses:
        '200':
          description: Environments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Env'

components:
  parameters:
    AppPath:
      name: app
      in: path
      required: true
      description: Application name (natural key — matches OpenTelemetry `service.name`).
      schema:
        type: string
    HashPath:
      name: hash
      in: path
      required: true
      description: Stable metric hash (matches OpenTelemetry `ebean.query_hash`).
      schema:
        type: string
    EnvQuery:
      name: env
      in: query
      schema:
        type: string
      description: Environment name filter.
    AllApps:
      name: allApps
      in: query
      schema:
        type: boolean
        default: false
      description: |
        Cross-app rollup toggle for `by=name` and tag grouping (no effect when
        `by=hash`, which is already per-metric). Default `false`: each
        application is kept as its own row, so a metric reported by several apps
        appears once per app (APP populated). When `true`, groups that share the
        same name/tag value are aggregated across all applications into a single
        row (APP blank).
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 200
      description: Max items to return (default 50, hard cap 200).
    OrderBy:
      name: orderBy
      in: query
      schema:
        type: string
        enum: [total, mean, max, count, value]
        default: total
      description: |
        Sort dimension for top-N. `total`/`mean`/`max`/`count` apply to timer
        metrics; `value` applies to gauge metrics (peak over the window).
        Unknown values yield 400.
    By:
      name: by
      in: query
      schema:
        type: string
        default: label
      description: |
        Aggregation dimension for the ranked `top` result. Selects the level:
        `hash` ranks individual metrics (one row per hash/identity, with
        key/loc/sql/planCapable); `name` ranks families; any tag key
        (`label` (default), `type`, `kind`, `db`, `op`, `region`, ...) groups by
        that tag, summing timer stats (or taking the peak for gauges) across the
        rows that share the value. Rows that do not carry the `by` tag are
        excluded (so grouping by a tag a family lacks yields an empty list).
    MetricName:
      name: name
      in: query
      schema:
        type: string
      description: Optional metric family filter (e.g. `ebean.query`, `web.api`, `datasource.pool.size`).
    LabelTag:
      name: label
      in: query
      schema:
        type: string
      description: Optional label filter (exact match on the `label` tag, or family name for v1-style metrics).
    KindTag:
      name: kind
      in: query
      schema:
        type: string
      description: Optional tag filter on the `kind` tag (e.g. `orm`, `dto`, `sql`).
    TypeTag:
      name: type
      in: query
      schema:
        type: string
      description: Optional tag filter on the `type` tag (e.g. a bean type like `Customer`, or `main`/`readonly`).
    SinceMinutes:
      name: sinceMinutes
      in: query
      schema:
        type: integer
        format: int64
        minimum: 1
      description: Window size in minutes. Mutually exclusive with `sinceHours`.
    SinceHours:
      name: sinceHours
      in: query
      schema:
        type: integer
        format: int64
        minimum: 1
      description: Window size in hours. Mutually exclusive with `sinceMinutes`.
    OlderThanMinutes:
      name: olderThanMinutes
      in: query
      schema:
        type: integer
        format: int64
        minimum: 0
      description: Capture-age threshold in minutes. Mutually exclusive with `olderThanHours`.
    OlderThanHours:
      name: olderThanHours
      in: query
      schema:
        type: integer
        format: int64
        minimum: 0
      description: Capture-age threshold in hours. Mutually exclusive with `olderThanMinutes`.
    ActiveWithinMinutes:
      name: activeWithinMinutes
      in: query
      schema:
        type: integer
        format: int64
        minimum: 1
      description: Activity window in minutes. Mutually exclusive with `activeWithinHours`.
    ActiveWithinHours:
      name: activeWithinHours
      in: query
      schema:
        type: integer
        format: int64
        minimum: 1
      description: Activity window in hours. Mutually exclusive with `activeWithinMinutes`.
    ChangeTypeQuery:
      name: changeType
      in: query
      schema:
        type: string
        enum: [FIRST, CHANGED]
      description: Filter plan-change events by type. Unknown values yield 400.

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      required: [message]
      properties:
        message:
          type: string

    App:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string

    AppSummary:
      type: object
      required: [id, name, metricCount, planCount]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        lastReportAt:
          type: string
          format: date-time
        metricCount:
          type: integer
          format: int64
        planCount:
          type: integer
          format: int64

    Env:
      type: object
      required: [name]
      properties:
        name:
          type: string

    AppMetric:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          description: Metric family (e.g. `ebean.query`, `web.api`, `datasource.pool.size`).
        label:
          type: string
          description: |
            Human-readable display label: the `label` tag when present
            (e.g. `Customer.findList`), otherwise the family `name`.
        tags:
          type: object
          additionalProperties:
            type: string
          description: Canonical metric tags (e.g. kind=orm, type=Customer, label=Customer.findList).
        key:
          type: string
          description: Stable identity key (query hash, or md5 of name+tags for non-query metrics).
        loc:
          type: string
        sql:
          type: string

    AppMetricStats:
      type: object
      required: [id, app, label, key, planCapable, count, totalMicros, meanMicros, maxMicros, windowMinutes]
      properties:
        id:
          type: integer
          format: int64
        app:
          type: string
        name:
          type: string
          description: Metric family (e.g. `ebean.query`).
        label:
          type: string
          description: Display label (the `label` tag, else the family `name`).
        tags:
          type: object
          additionalProperties:
            type: string
        key:
          type: string
        loc:
          type: string
        planCapable:
          type: boolean
        count:
          type: integer
          format: int64
        totalMicros:
          type: integer
          format: int64
        meanMicros:
          type: integer
          format: int64
        maxMicros:
          type: integer
          format: int64
        value:
          type: number
          format: double
          description: Gauge reading (peak over the window). Null for timer metrics.
        windowMinutes:
          type: integer
          format: int64

    TopGroup:
      type: object
      description: |
        One ranked row from a `top` query. The aggregation dimension is chosen by
        the `by` parameter; `group` holds the value ranked at that dimension
        (a family when `by=name`, a label when `by=label`, a hash when `by=hash`,
        a tag value otherwise). Timer stats (`count`/`total`/`mean`/`max`) are
        summed across the group; gauge `value` is the peak. `key`/`loc`/`sql`/
        `planCapable` are populated only when `by=hash` (a single underlying metric).
      required: [group, name, hashCount, windowMinutes]
      properties:
        group:
          type: string
          description: The ranked value at the chosen `by` dimension.
        app:
          type: string
          description: Application name; null when the group spans multiple applications.
        name:
          type: string
          description: Metric family (e.g. `ebean.query`).
        label:
          type: string
          description: Display label; null when not single-valued for the group (e.g. `by=type`/`by=name`).
        tags:
          type: object
          additionalProperties:
            type: string
          description: Canonical tags; present only when the group is a single metric (`by=hash`).
        key:
          type: string
          description: Identity key; present only when `by=hash`.
        loc:
          type: string
        sql:
          type: string
        planCapable:
          type: boolean
          description: True when the group is (or contains) a plan-capable metric.
        count:
          type: integer
          format: int64
          description: Summed execution count over the window (timer metrics).
        totalMicros:
          type: integer
          format: int64
          description: Summed total time over the window (timer metrics).
        meanMicros:
          type: integer
          format: int64
        maxMicros:
          type: integer
          format: int64
        value:
          type: number
          format: double
          description: Gauge reading (peak over the window). Null for timer metrics.
        hashCount:
          type: integer
          format: int64
          description: Number of underlying metric identities (hashes) in the group.
        windowMinutes:
          type: integer
          format: int64

    MetricTimeBucket:
      type: object
      required: [eventTime, count, total, max]
      properties:
        eventTime:
          type: string
          format: date-time
          description: Bucket start time.
        count:
          type: integer
          format: int64
        total:
          type: integer
          format: int64
          description: Total execution micros in the bucket (additive).
        max:
          type: integer
          format: int64
          description: Max single-execution micros in the bucket.

    MetricTimeseries:
      type: object
      required: [app, hash, windowMinutes, bucketMinutes, buckets]
      properties:
        app:
          type: string
        hash:
          type: string
        label:
          type: string
        windowMinutes:
          type: integer
          format: int64
        bucketMinutes:
          type: integer
          format: int64
          description: Resolution chosen for the window (1, 10, 60 or 1440).
        buckets:
          type: array
          items:
            $ref: '#/components/schemas/MetricTimeBucket'

    MissingPlanMetric:
      type: object
      required: [id, app, label, key, captureCount, count, totalMicros, meanMicros, maxMicros, windowMinutes]
      properties:
        id:
          type: integer
          format: int64
        app:
          type: string
        label:
          type: string
        key:
          type: string
        loc:
          type: string
        lastCapturedAt:
          type: string
          format: date-time
          description: Null when no plan has ever been captured.
        captureCount:
          type: integer
          format: int64
        sql:
          type: string
        count:
          type: integer
          format: int64
          description: Execution count over the cost window (0 if not executed in the window).
        totalMicros:
          type: integer
          format: int64
          description: Total execution time (micros) over the cost window.
        meanMicros:
          type: integer
          format: int64
          description: Mean execution time (micros) over the cost window.
        maxMicros:
          type: integer
          format: int64
          description: Max execution time (micros) over the cost window.
        windowMinutes:
          type: integer
          format: int64
          description: Size of the cost window in minutes.

    QueryPlanSummary:
      type: object
      required: [id, appMetricId, envName, hash, label, queryTimeMicros, captureCount, whenCaptured]
      properties:
        id:
          type: integer
          format: int64
        appMetricId:
          type: integer
          format: int64
        envName:
          type: string
        hash:
          type: string
        label:
          type: string
        queryTimeMicros:
          type: integer
          format: int64
        captureCount:
          type: integer
          format: int64
        whenCaptured:
          type: string
          format: date-time
        planShapeHash:
          type: string
        shapeChanged:
          type: boolean

    QueryPlan:
      type: object
      required: [id, hash, label, appMetricId, envName, queryTimeMicros, captureCount, captureMicros, whenCaptured]
      properties:
        id:
          type: integer
          format: int64
        hash:
          type: string
        label:
          type: string
        appMetricId:
          type: integer
          format: int64
        envName:
          type: string
        queryTimeMicros:
          type: integer
          format: int64
        captureCount:
          type: integer
          format: int64
        captureMicros:
          type: integer
          format: int64
        whenCaptured:
          type: string
          format: date-time
        sql:
          type: string
        bind:
          type: string
        plan:
          type: string
        planShape:
          type: string
        planShapeHash:
          type: string
        planShapeAlgo:
          type: integer
          format: int32

    PendingResponse:
      type: object
      required: [pending]
      properties:
        pending:
          type: integer
          format: int32
          description: Number of pending capture requests queued for the target app+env.
        app:
          type: string
          description: Application the capture was requested for.
        env:
          type: string
          description: Environment the capture was requested for; "*" means any environment (the capture was requested without a target env).
        label:
          type: string
          description: Human-readable metric label (e.g. "orm.OrderDao.findOrders") for the requested capture.

    PendingPlan:
      type: object
      required: [app, env, hash]
      properties:
        app:
          type: string
          description: Application the capture was requested for.
        env:
          type: string
          description: Environment the capture was requested for; "*" means any environment (the capture was requested without a target env).
        hash:
          type: string
          description: Metric hash (query plan key) awaiting capture.
        label:
          type: string
          description: Human-readable metric label (e.g. "orm.OrderDao.findOrders") for the awaited capture.
        requestedAt:
          type: string
          format: date-time
          description: When the capture was requested (UTC). Used to show how long it has been in-flight.

    PlanChange:
      type: object
      description: A detected query-plan shape event (FIRST or CHANGED), newest first by detection time.
      required: [id, appName, envName, hash, changeType, toPlanId, toShapeHash, algo, toQueryTimeMicros, whenCaptured, detectedAt]
      properties:
        id:
          type: integer
          format: int64
        appName:
          type: string
          description: Application the change was detected for.
        envName:
          type: string
          description: Environment the change was detected in.
        hash:
          type: string
          description: Stable metric hash (query plan key).
        label:
          type: string
          description: Human-readable metric label (e.g. "orm.OrderDao.findOrders").
        changeType:
          type: string
          enum: [FIRST, CHANGED]
          description: FIRST = first shape observed for the series; CHANGED = shape differs from the prior capture.
        fromPlanId:
          type: integer
          format: int64
          description: Plan id of the prior capture (null for FIRST events).
        toPlanId:
          type: integer
          format: int64
          description: Plan id of the capture whose shape triggered this event.
        fromShapeHash:
          type: string
          description: Prior plan shape hash (null for FIRST events).
        toShapeHash:
          type: string
          description: New plan shape hash.
        algo:
          type: integer
          format: int32
          description: Shape-normalization algorithm version used for the comparison.
        fromQueryTimeMicros:
          type: integer
          format: int64
          description: Query time (micros) of the prior capture (null for FIRST events).
        toQueryTimeMicros:
          type: integer
          format: int64
          description: Query time (micros) of the triggering capture.
        whenCaptured:
          type: string
          format: date-time
          description: When the triggering plan was captured (UTC).
        detectedAt:
          type: string
          format: date-time
          description: When the change was detected at ingest (UTC). Primary sort key.

    PlanChangeDetail:
      type: object
      description: A plan-change event with the full captured from/to plans for diffing.
      required: [change, toPlan]
      properties:
        change:
          $ref: '#/components/schemas/PlanChange'
        fromPlan:
          $ref: '#/components/schemas/QueryPlan'
        toPlan:
          $ref: '#/components/schemas/QueryPlan'
