server.port: 8091
#server.context.path: /
#server.context.host: 0.0.0.0

app.name: ebean-insight
load.properties: /app/config/insight-config.yaml

ebean.queryPlan.enable: true

##
## Forwarder: forward incoming metrics to an OTLP/HTTP endpoint (e.g. Grafana Alloy).
## Disabled by default. Storage + UI + query-plan back-channel are unaffected.
##
forward:
  otel:
    enabled: false
    endpoint: http://localhost:4318
    namespace: ""
    reportingPeriodSeconds: 60
    timeoutSeconds: 30
    connectTimeoutSeconds: 10
    queueSize: 1024
    pollMillis: 200
#    headers:
#      Authorization: "Bearer ..."

##
## Storage: when running purely as a smart-proxy (forward.otel.enabled=true),
## set metrics.store.enabled=false to skip writing metrics into Postgres.
## Note: query plans are still ingested and stored regardless of this flag.
##
metrics:
  store:
    enabled: true

##
## Auto plan capture: when an SQL/orm query metric exceeds its threshold,
## the server pushes a "qp:<hash>" capture request via the existing back-channel.
## Per-query overrides (DAppMetric.planThresholdMicros) take precedence over
## the global default. Per-query overrides are unavailable in forward-only mode.
##
autoplan:
  enabled: false                  # opt-in
  defaultThresholdMicros: 100000  # 100ms global default mean threshold
  cooldownMinutes: 180            # don't re-request the same hash within this window
  maxTracked: 5000                # cooldown-cache size cap
  thresholdsCacheTtlMillis: 300000 # 5 min — how often DB threshold overrides are refreshed

##
## Postgres setup - To use local docker instance see src/test/main/StartPostgresDocker.main()
##
ebean:
  dbSchema: ${db_user:ebean_insight}
  migration.run: true

datasource:
  db:
    username: ${db_user:ebean_insight}
    password: ${db_pass:ebean_insight}
    url: jdbc:postgresql://${db_url:localhost:9432}/ebean_insight

