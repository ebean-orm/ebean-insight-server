# Single-binary Mimir for local verification.
target: all

multitenancy_enabled: false

server:
  http_listen_port: 9009
  log_level: warn

common:
  storage:
    backend: filesystem
    filesystem:
      dir: /tmp/mimir/data

blocks_storage:
  backend: filesystem
  filesystem:
    dir: /tmp/mimir/blocks
  bucket_store:
    sync_dir: /tmp/mimir/tsdb-sync
  tsdb:
    dir: /tmp/mimir/tsdb

compactor:
  data_dir: /tmp/mimir/compactor

store_gateway:
  sharding_ring:
    replication_factor: 1

ingester:
  ring:
    replication_factor: 1
    instance_addr: 127.0.0.1

ruler_storage:
  backend: filesystem
  filesystem:
    dir: /tmp/mimir/rules

limits:
  ingestion_rate: 100000
  ingestion_burst_size: 1000000
  out_of_order_time_window: 1h
