services:

  alloy:
    image: grafana/alloy:latest
    container_name: insight-alloy
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - --stability.level=experimental
      - /etc/alloy/config.alloy
    ports:
      - "4318:4318"   # OTLP HTTP (ebean-insight-server forwards here)
      - "4317:4317"   # OTLP gRPC (unused)
      - "12345:12345" # Alloy UI
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
    depends_on:
      - mimir

  mimir:
    image: grafana/mimir:latest
    container_name: insight-mimir
    command:
      - -config.file=/etc/mimir/mimir.yaml
    ports:
      - "9009:9009"
    volumes:
      - ./mimir/mimir.yaml:/etc/mimir/mimir.yaml:ro

  grafana:
    image: grafana/grafana:latest
    container_name: insight-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - mimir
